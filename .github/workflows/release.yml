name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Import Code Signing Certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERT_P12_BASE64}" ]; then
            echo "MACOS_CERT_P12_BASE64 is not set. Skipping code signing."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Build Release App
        run: |
          xcodebuild \
            -project BLEUnlock.xcodeproj \
            -scheme BLEUnlock \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Code Sign App
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "${MACOS_SIGNING_IDENTITY}" ]; then
            echo "MACOS_SIGNING_IDENTITY is not set. Skipping code signing."
            exit 0
          fi

          APP_PATH="build/Build/Products/Release/BLEUnlock.app"
          ENTITLEMENTS_PATH="BLEUnlock/BLEUnlock.entitlements"
          /usr/bin/codesign --force --deep --options runtime --entitlements "${ENTITLEMENTS_PATH}" --sign "${MACOS_SIGNING_IDENTITY}" "${APP_PATH}"

      - name: Package App
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent BLEUnlock.app BLEUnlock-${RELEASE_TAG}.zip

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_PATH="build/Build/Products/Release/BLEUnlock-${RELEASE_TAG}.zip"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSET_PATH}" --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file CHANGELOG.md
          else
            gh release create "${RELEASE_TAG}" \
              "${ASSET_PATH}" \
              --title "${RELEASE_TAG}" \
              --notes-file CHANGELOG.md
          fi
